services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tvp
      POSTGRES_USER: tvp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./web
    depends_on:
      - api
    environment:
      # SSR (conteneur -> conteneur) : URL interne Docker
      API_URL_INTERNAL: http://api:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
